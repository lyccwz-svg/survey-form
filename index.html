<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流量主与商户调研表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
.container { max-width: 800px; width: 100%; text-align: center; }
.header { margin-bottom: 50px; color: #fff; }
.header h1 { font-size: 36px; margin-bottom: 12px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
.header p { font-size: 16px; opacity: 0.9; }
.cards { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
.card { background: #fff; border-radius: 20px; padding: 40px 30px; width: 320px; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; color: #333; display: block; }
.card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
.card-icon { width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; }
.card-merchant .card-icon { background: linear-gradient(135deg, #6366f1, #818cf8); }
.card-influencer .card-icon { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
.card h2 { font-size: 22px; margin-bottom: 10px; }
.card p { font-size: 14px; color: #666; line-height: 1.6; }
.card .arrow { margin-top: 20px; font-size: 24px; color: #6366f1; transition: transform 0.3s; }
.card:hover .arrow { transform: translateX(8px); }
.card-influencer .arrow { color: #f59e0b; }
.footer { margin-top: 50px; color: rgba(255,255,255,0.7); font-size: 13px; }
@media (max-width: 640px) { .header h1 { font-size: 26px; } .cards { flex-direction: column; align-items: center; } .card { width: 100%; max-width: 320px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>流量主与商户调研表</h1>
    <p>请选择您的身份，填写对应调研表</p>
  </div>
  <div class="cards">
    <a href="merchant.html" class="card card-merchant">
      <div class="card-icon">🏢</div>
      <h2>我是商户</h2>
      <p>广告主 / 品牌方<br>投放需求、预算、素材要求</p>
      <div class="arrow">→</div>
    </a>
    <a href="influencer.html" class="card card-influencer">
      <div class="card-icon">🎬</div>
      <h2>我是流量主</h2>
      <p>内容创作者 / 达人<br>账号数据、创作能力、合作意愿</p>
      <div class="arrow">→</div>
    </a>
  </div>
  <div class="footer">感谢您的参与，您的反馈对我们非常重要</div>
</div>
</body>
</html>
